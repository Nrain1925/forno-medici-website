<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Forno Medici Foods</title>
  <meta name="description" content="Thank you for contacting Forno Medici Foods." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      --bg: #f7f1e8;
      --paper: #fcf8f2;
      --text: #1d1611;
      --muted: #665c54;
      --gold: #d8b06c;
      --dark: #221710;
      --line: rgba(0,0,0,0.08);
      --shadow: 0 18px 45px rgba(34, 23, 16, 0.1);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #f6efe4 0%, #fbf7f0 45%, #efe2cf 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 42px;
      text-align: center;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #9c6d2c;
    }

    h1 {
      margin: 14px 0 0;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.02;
    }

    p {
      margin: 18px auto 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      padding: 14px 20px;
      font-weight: 600;
      text-decoration: none;
    }

    .btn-gold {
      background: var(--gold);
      color: #111;
    }

    .btn-dark {
      background: var(--dark);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Thank You</div>
    <h1>Your inquiry has been received.</h1>
    <p>
      Thank you for contacting Forno Medici Foods. Our team will review your request
      and follow up with you shortly regarding samples, product specifications,
      or distribution information.
    </p>

    <div class="actions">
      <a href="index.html" class="btn btn-dark">Return to Homepage</a>
      <a href="Forno-Medici-Sell-Sheet.pdf" class="btn btn-gold" target="_blank">Download Sell Sheet</a>
    </div>
  </div>
</body>
</html>
